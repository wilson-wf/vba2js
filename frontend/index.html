<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBA到WPS JS宏转换器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .header p {
      color: #666;
      font-size: 14px;
    }
    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #667eea;
      background: #f8f9ff;
    }
    .upload-area .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .upload-area h3 {
      color: #333;
      font-size: 16px;
      margin-bottom: 8px;
    }
    .upload-area p {
      color: #999;
      font-size: 14px;
    }
    .upload-area input {
      display: none;
    }
    .options {
      margin-bottom: 20px;
    }
    .option-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .option-item label {
      color: #333;
      font-size: 14px;
    }
    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
      background: #ddd;
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .toggle.active {
      background: #667eea;
    }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      transition: left 0.3s ease;
    }
    .toggle.active::after {
      left: 24px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }
    .progress-container {
      margin-top: 20px;
    }
    .progress-bar {
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-text {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }
    .stage-info {
      text-align: center;
      color: #667eea;
      font-size: 14px;
      margin-top: 12px;
    }
    .result {
      margin-top: 20px;
      padding: 20px;
      background: #d4edda;
      border-radius: 8px;
      text-align: center;
    }
    .result a {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 20px;
      background: #11998e;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.3s ease;
    }
    .result a:hover {
      background: #0e7a70;
    }
    .error {
      margin-top: 20px;
      padding: 20px;
      background: #f8d7da;
      border-radius: 8px;
      color: #721c24;
      text-align: center;
    }
    .config-section {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #eee;
    }
    .config-section h3 {
      color: #333;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      color: #666;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-success {
      background: #d4edda;
      color: #155724;
    }
    .status-error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>📊 VBA到WPS JS宏转换器</h1>
        <p>上传带有VBA宏的Excel文件，自动转换为WPS JS宏版本</p>
      </div>

      <div 
        class="upload-area" 
        @click="triggerUpload"
        @dragover.prevent="isDragover = true"
        @dragleave.prevent="isDragover = false"
        @drop.prevent="handleDrop"
        :class="{ dragover: isDragover }"
      >
        <div class="icon">📁</div>
        <h3>点击或拖拽文件到此处</h3>
        <p>支持 .xlsm 格式文件，最大50MB</p>
        <input 
          ref="fileInput" 
          type="file" 
          accept=".xlsm" 
          @change="handleFileSelect"
        />
      </div>

      <div v-if="selectedFile" class="file-info">
        <div class="option-item">
          <span>已选择: {{ selectedFile.name }}</span>
        </div>
      </div>

      <div class="options">
        <div class="option-item">
          <label>使用AI增强转换（需要配置LLM）</label>
          <div class="toggle" :class="{ active: useLLM }" @click="useLLM = !useLLM"></div>
        </div>
      </div>

      <button 
        class="btn btn-primary" 
        :disabled="!selectedFile || isConverting"
        @click="startConvert"
      >
        {{ isConverting ? '转换中...' : '开始转换' }}
      </button>

      <div v-if="isConverting" class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" :style="{ width: progress + '%' }"></div>
        </div>
        <div class="progress-text">{{ progress }}%</div>
        <div class="stage-info">{{ currentStage }}</div>
      </div>

      <div v-if="convertSuccess" class="result">
        <div>🎉 转换成功！</div>
        <a :href="downloadUrl" download>点击下载转换后的文件</a>
      </div>

      <div v-if="convertError" class="error">
        ❌ {{ convertError }}
      </div>

      <div class="config-section">
        <h3>⚙️ LLM配置</h3>
        <div class="form-group">
          <label>API Key</label>
          <input 
            v-model="llmConfig.apiKey" 
            type="password" 
            placeholder="输入您的API Key"
          />
        </div>
        <div class="form-group">
          <label>API端点</label>
          <input 
            v-model="llmConfig.endpoint" 
            type="text" 
            placeholder="https://api.openai.com/v1/chat/completions"
          />
        </div>
        <div class="form-group">
          <label>模型名称</label>
          <input 
            v-model="llmConfig.model" 
            type="text" 
            placeholder="gpt-4"
          />
        </div>
        <button class="btn btn-success" @click="saveLLMConfig">保存配置</button>
        <div v-if="llmStatus" class="status-badge" :class="llmStatusClass">
          {{ llmStatus }}
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
